publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.2.2
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  webview_flutter: ^4.14.0

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
