name: crag
description: "A field notebook for reading outdoor climbing sectors, approach windows, and route intent."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  camera: ^0.11.2
  flutter:
    sdk: flutter
  image_picker: ^1.2.2
  in_app_purchase: ^3.3.0
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  video_player: ^2.11.1
  webview_flutter: ^4.14.0

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/avatars/
    - assets/images/community_posts/
    - assets/images/spots/
    - assets/images/video_covers/
    - assets/videos/
  fonts:
    - family: ClimbySans
      fonts:
        - asset: assets/fonts/climby_sans_variable.ttf
    - family: ClimbyDisplay
      fonts:
        - asset: assets/fonts/climby_display_semibold.ttf
          weight: 600
        - asset: assets/fonts/climby_display_extrabold.ttf
          weight: 800
    - family: ClimbyDigits
      fonts:
        - asset: assets/fonts/climby_digits_semibold.ttf
          weight: 600
        - asset: assets/fonts/climby_digits_bold.ttf
          weight: 700
